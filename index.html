<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办清单</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- 登录 / 注册 -->
  <section class="auth-view" id="authView">
    <div class="auth-card">
      <div class="auth-header">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <h1>待办清单</h1>
        <p class="subtitle">登录后管理你的专属待办事项</p>
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" data-auth-tab="login" role="tab">登录</button>
        <button class="auth-tab" data-auth-tab="register" role="tab">注册</button>
      </div>

      <form class="auth-form" id="loginForm" autocomplete="on">
        <div class="form-field">
          <label for="loginUsername">用户名</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名" maxlength="20" required>
        </div>
        <div class="form-field">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" maxlength="32" required>
        </div>
        <p class="auth-error" id="loginError" hidden></p>
        <button type="submit" class="btn btn-auth">登录</button>
      </form>

      <form class="auth-form" id="registerForm" hidden autocomplete="on">
        <div class="form-field">
          <label for="registerUsername">用户名</label>
          <input type="text" id="registerUsername" placeholder="3-20 位字母、数字或下划线" maxlength="20" required>
        </div>
        <div class="form-field">
          <label for="registerPassword">密码</label>
          <input type="password" id="registerPassword" placeholder="至少 6 位" maxlength="32" required>
        </div>
        <div class="form-field">
          <label for="registerConfirm">确认密码</label>
          <input type="password" id="registerConfirm" placeholder="再次输入密码" maxlength="32" required>
        </div>
        <p class="auth-error" id="registerError" hidden></p>
        <button type="submit" class="btn btn-auth">注册</button>
      </form>
    </div>
  </section>

  <!-- 主应用 -->
  <main class="app" id="appView" hidden>
    <header class="header">
      <div class="user-bar">
        <div class="user-info">
          <span class="user-avatar" id="userAvatar">U</span>
          <span class="user-name" id="userName">用户</span>
        </div>
        <button class="btn-logout" id="logoutBtn" type="button">退出登录</button>
      </div>
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <h1>待办清单</h1>
      <p class="subtitle">计划每天要做的，专注完成它</p>
    </header>

    <section class="card">
      <section class="add-todo-module">
        <h2 class="module-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          添加待办
        </h2>
        <form class="add-todo-form" id="todoForm" autocomplete="off">
          <div class="form-field">
            <label for="todoInput">任务内容</label>
            <input
              type="text"
              id="todoInput"
              placeholder="输入待办事项内容…"
              maxlength="200"
              aria-label="新任务"
            >
          </div>
          <div class="add-todo-fields">
            <div class="field-group">
              <label for="addPriority">优先级</label>
              <select id="addPriority" aria-label="优先级">
                <option value="high">高</option>
                <option value="medium" selected>中</option>
                <option value="low">低</option>
              </select>
            </div>
            <div class="field-group">
              <label for="addDueDate">截止日期</label>
              <input type="date" id="addDueDate" aria-label="截止日期">
            </div>
            <div class="field-group field-group-grow">
              <label for="addAssignee">关系人</label>
              <input
                type="text"
                id="addAssignee"
                placeholder="输入姓名"
                maxlength="50"
                list="assigneeList"
                aria-label="关系人"
              >
            </div>
          </div>
          <div class="form-field">
            <label for="addRemindAt">提醒时间 <span class="label-hint">可选</span></label>
            <input type="datetime-local" id="addRemindAt" aria-label="提醒时间">
          </div>
          <div class="form-field">
            <label>图片附件 <span class="label-hint">最多 3 张</span></label>
            <div class="image-upload">
              <div class="image-preview-list" id="addImagePreview"></div>
              <div class="image-upload-bar">
                <input type="file" id="addImages" accept="image/*" multiple hidden aria-label="选择图片">
                <button type="button" class="btn-upload" id="addImageBtn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                  </svg>
                  选择图片
                </button>
                <span class="image-count" id="addImageCount">0/3</span>
              </div>
            </div>
          </div>
          <button type="submit" class="btn-create" aria-label="创建待办">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            创建待办
          </button>
        </form>
      </section>

      <div class="search-bar">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="personSearch"
            placeholder="按关系人检索…"
            maxlength="50"
            list="assigneeList"
            aria-label="按关系人检索"
          >
          <button type="button" class="btn-clear-search" id="clearPersonSearch" hidden aria-label="清除检索">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <datalist id="assigneeList"></datalist>
      </div>

      <div class="toolbar">
        <div class="filters" role="tablist">
          <button class="filter-btn active" data-filter="all" role="tab">全部</button>
          <button class="filter-btn" data-filter="active" role="tab">进行中</button>
          <button class="filter-btn" data-filter="completed" role="tab">已完成</button>
        </div>
        <div class="stats">
          <span id="activeCount">0</span> 项待完成
        </div>
      </div>

      <ul class="todo-list" id="todoList" aria-live="polite"></ul>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 64 64" fill="none">
            <rect x="8" y="12" width="48" height="40" rx="6" stroke="currentColor" stroke-width="2"/>
            <line x1="20" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="20" y1="32" x2="36" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="20" y1="40" x2="40" y2="40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">还没有任务</p>
        <p class="empty-desc">在上方输入框添加你的第一个待办吧</p>
      </div>

      <footer class="card-footer" id="cardFooter" hidden>
        <button class="btn-clear" id="clearCompleted">清除已完成</button>
      </footer>
    </section>
  </main>

  <!-- 编辑弹窗 -->
  <dialog class="edit-dialog" id="editDialog">
    <form method="dialog" class="edit-form" id="editForm">
      <h2>编辑任务</h2>
      <div class="form-field">
        <label for="editInput">任务内容</label>
        <textarea
          id="editInput"
          rows="3"
          maxlength="200"
          placeholder="输入任务内容…"
          aria-label="编辑任务内容"
        ></textarea>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="editPriority">优先级</label>
          <select id="editPriority" aria-label="优先级">
            <option value="high">高</option>
            <option value="medium">中</option>
            <option value="low">低</option>
          </select>
        </div>
        <div class="form-field">
          <label for="editDueDate">截止日期</label>
          <input type="date" id="editDueDate" aria-label="截止日期">
        </div>
      </div>
      <div class="form-field">
        <label for="editAssignee">关系人</label>
        <input
          type="text"
          id="editAssignee"
          placeholder="输入姓名"
          maxlength="50"
          list="assigneeList"
          aria-label="关系人"
        >
      </div>
      <div class="form-field">
        <label for="editRemindAt">提醒时间 <span class="label-hint">留空则取消提醒</span></label>
        <input type="datetime-local" id="editRemindAt" aria-label="提醒时间">
      </div>
      <div class="form-field">
        <label>图片附件 <span class="label-hint">最多 3 张</span></label>
        <div class="image-upload">
          <div class="image-preview-list" id="editImagePreview"></div>
          <div class="image-upload-bar">
            <input type="file" id="editImages" accept="image/*" multiple hidden aria-label="选择图片">
            <button type="button" class="btn-upload" id="editImageBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              选择图片
            </button>
            <span class="image-count" id="editImageCount">0/3</span>
          </div>
        </div>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn btn-cancel" id="editCancel">取消</button>
        <button type="submit" class="btn btn-save">保存</button>
      </div>
    </form>
  </dialog>

  <!-- 删除确认 -->
  <dialog class="confirm-dialog" id="confirmDialog">
    <form method="dialog" class="confirm-form">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        </svg>
      </div>
      <h2>确认删除？</h2>
      <p id="confirmText">此操作无法撤销</p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-cancel" id="confirmCancel">取消</button>
        <button type="button" class="btn btn-danger" id="confirmDelete">删除</button>
      </div>
    </form>
  </dialog>

  <!-- 提醒弹窗 -->
  <dialog class="reminder-dialog" id="reminderDialog">
    <div class="reminder-form">
      <div class="reminder-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
      </div>
      <h2>待办提醒</h2>
      <p class="reminder-text" id="reminderText"></p>
      <p class="reminder-meta" id="reminderMeta"></p>
      <div class="reminder-actions">
        <button type="button" class="btn btn-remind-dismiss" data-action="dismiss">不再提醒</button>
        <button type="button" class="btn btn-remind-snooze" data-action="snooze" data-minutes="15">15 分钟后</button>
        <button type="button" class="btn btn-remind-snooze" data-action="snooze" data-minutes="60">1 小时后</button>
        <button type="button" class="btn btn-remind-snooze" data-action="snooze" data-minutes="180">3 小时后</button>
      </div>
    </div>
  </dialog>

  <!-- 图片预览 -->
  <dialog class="image-viewer" id="imageViewer">
    <button type="button" class="viewer-close" id="viewerClose" aria-label="关闭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <img id="viewerImage" alt="图片预览">
  </dialog>

  <script src="app.js"></script>
</body>
</html>
